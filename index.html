ضلات',icon:'💪'},{id:'fatloss',label:'خسارة الدهون',icon:'🔥'},{id:'fitness',label:'تحسين اللياقة',icon:'🏃'},{id:'nutrition',label:'تحسين التغذية',icon:'🥗'}];const MEAL_TIPS={lose:[{mealType:'breakfast',time:'الإفطار (6-8 صباحاً)',tips:'ابدأ بوجبة خفيفة غنية بالبروتين (25-30% من السعرات):\n• بيضتان + شريحة خبز + خضروات\n• يوغورت + حبات تمر',calPercent:25},{mealType:'lunch',time:'الغداء (12-2 ظهراً)',tips:'وجبة رئيسية متوازنة (45-50% من السعرات):\n• دجاج/سمك مع أرز وخضروات\n• تركيز على البروتين والألياف',calPercent:48},{mealType:'dinner',time:'العشاء (7-9 مساءً)',tips:'وجبة خفيفة قبل النوم (20-25% من السعرات):\n• دجاج مسلوق مع خضروات\n• تجنب الكربوهيدرات الثقيلة',calPercent:27}],gain:[{mealType:'breakfast',time:'الإفطار (6-8 صباحاً)',tips:'وجبة فخمة غنية (30% من السعرات):\n• بيضتان + جبن + خبز + حليب\n• إضافة المكسرات والتمر',calPercent:30},{mealType:'lunch',time:'الغداء (12-2 ظهراً)',tips:'وجبة كبيرة (40-45% من السعرات):\n• لحم بقري مع أرز وزيت\n• إضافة منتجات ألبان\n• أكثر من الكربوهيدرات',calPercent:42},{mealType:'dinner',time:'العشاء (7-9 مساءً)',tips:'وجبة دسمة (25-30% من السعرات):\n• دجاج مع أرز وزيت زيتون\n• حليب ومكسرات كسناك',calPercent:28}],muscle:[{mealType:'breakfast',time:'الإفطار (6-8 صباحاً)',tips:'بروتين عالي (25-30% من السعرات):\n• بيضتان + حليب + شوفان\n• هدفك: 30-40 غرام بروتين',calPercent:27},{mealType:'lunch',time:'الغداء (12-2 ظهراً)',tips:'وجبة قوية للعضلات (45-50% من السعرات):\n• دجاج/سمك مع أرز + خضروات\n• البروتين الأساسي في اليوم',calPercent:48},{mealType:'dinner',time:'العشاء (7-9 مساءً)',tips:'بروتين خفيف (20-25% من السعرات):\n• سمك مسلوق مع خضروات\n• قبل النوم بساعتين',calPercent:25}],maintain:[{mealType:'breakfast',time:'الإفطار (6-8 صباحاً)',tips:'وجبة متوازنة (25-30% من السعرات):\n• بيضة أو زبادي مع فاكهة\n• كمية معتدلة من كل عنصر',calPercent:28},{mealType:'lunch',time:'الغداء (12-2 ظهراً)',tips:'وجبة رئيسية (45-50% من السعرات):\n• بروتين + كربوهيدرات + دهون صحية\n• التوازن هو المفتاح',calPercent:48},{mealType:'dinner',time:'العشاء (7-9 مساءً)',tips:'وجبة خفيفة متوازنة (20-25% من السعرات):\n• بروتين + خضروات\n• تجنب الإفراط',calPercent:24}]};let STATE={profile:null,tracking:{dailyLogs:{},weightHistory:[]},ui:{tab:'home',apiKey:''}};function save(){try{if(STATE.profile)localStorage.setItem('mizanProfile',JSON.stringify(STATE.profile));if(STATE.tracking)localStorage.setItem('mizanTracking',JSON.stringify(STATE.tracking));if(STATE.ui.apiKey)localStorage.setItem('mizanApiKey',STATE.ui.apiKey)}catch(e){}}function load(){try{const p=localStorage.getItem('mizanProfile');const t=localStorage.getItem('mizanTracking');const k=localStorage.getItem('mizanApiKey');if(p)STATE.profile=JSON.parse(p);if(t)STATE.tracking=JSON.parse(t);if(k)STATE.ui.apiKey=k;if(STATE.profile)STATE.ui.tab='home'}catch(e){}}function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function rand(){return Math.floor(Math.random()*1000000)}function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function getMealTips(){const goal=STATE.profile.goal;return MEAL_TIPS[goal]||MEAL_TIPS.maintain}function getMealSuggestions(remaining){const suggestions=[];if(remaining>=500){suggestions.push({title:'🥐 إفطار سريع',desc:'بيضتان + شريحة خبز + حليب',cal:~450})}if(remaining>=600&&remaining<800){suggestions.push({title:'🥗 سلطة صحية',desc:'دجاج مسلوق + خضروات + زيت زيتون',cal:~550})}if(remaining>=800){suggestions.push({title:'🍖 وجبة كاملة',desc:'لحم/دجاج مع أرز وخضروات',cal:~750})}if(remaining<300){suggestions.push({title:'🍎 فاكهة خفيفة',desc:'تفاحة أو موزة',cal:~80})}if(remaining>=300&&remaining<500){suggestions.push({title:'🥛 زبادي مع تمر',desc:'زبادي + حفنة تمر',cal:~200})}return suggestions}function renderApp(){const app=document.getElementById('app');if(!STATE.profile){renderSetup(app)}else if(STATE.ui.tab==='home'){renderHome(app)}else if(STATE.ui.tab==='meals'){renderMeals(app)}else if(STATE.ui.tab==='weight'){renderWeight(app)}else if(STATE.ui.tab==='settings'){renderSettings(app)}}function renderSetup(app){app.innerHTML=`<div class="app-header"><div class="app-title">ميزان<small>مرحباً بك</small></div></div><div class="container"><div class="card"><div class="section-title">أهلاً وسهلاً في ميزان</div><p class="muted">لنبدأ برحلتك نحو صحة أفضل وأكثر توازناً 💪</p><div class="field"><label>اسمك</label><input type="text" id="ob-name" placeholder="أدخل اسمك كاملاً"></div><div class="field"><label>عمرك</label><input type="number" id="ob-age" min="15" max="100" placeholder="مثال: 25"></div><div class="field"><label>جنسك</label><select id="ob-gender"><option value="">اختر...</option><option value="female">أنثى</option><option value="male">ذكر</option></select></div><div class="field"><label>طولك (سم)</label><input type="number" id="ob-height" min="100" max="250" placeholder="مثال: 165"></div><div class="field"><label>وزنك الحالي (كغ)</label><input type="number" id="ob-weight" min="30" max="300" step="0.5" placeholder="مثال: 65"></div><div class="field"><label>هدفك الرئيسي</label><select id="ob-goal"><option value="">اختر...</option>${GOALS.map(g=>'<option value="'+g.id+'">'+g.icon+' '+g.label+'</option>').join('')}</select></div><button class="btn btn-primary" onclick="submitSetup()">ابدأ الآن</button></div></div>`;document.getElementById('ob-name').focus()}function renderHome(app){const p=STATE.profile;const k=todayKey();const log=STATE.tracking.dailyLogs[k]||{};const consumed=log.meals?log.meals.reduce((s,m)=>s+(m.cal||0),0):0;const remaining=Math.max(0,p.targets.calories-consumed);const mealTips=getMealTips();const suggestions=getMealSuggestions(remaining);app.innerHTML=`<div class="app-header"><div class="app-title">أهلاً ${esc(p.name)}<small>${new Date().toLocaleDateString('ar')}</small></div></div><div class="container"><div class="card"><div class="section-title">⚖️ سعراتك المتبقية</div><div class="balance-figure">${remaining}</div><p style="text-align:center;color:var(--muted);font-size:16px;margin:0;">من أصل ${p.targets.calories} سعرة</p></div><div class="card"><div class="section-title">📊 التفاصيل الغذائية</div><div class="macro-row"><span>🥛 البروتين</span><span><strong>${log.meals?log.meals.reduce((s,m)=>s+(m.protein||0),0):0}</strong> / ${p.targets.protein} غ</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,log.meals?log.meals.reduce((s,m)=>s+(m.protein||0),0)*100/p.targets.protein:0)}%"></div></div><div class="macro-row" style="margin-top:12px;"><span>🌾 الكربوهيدرات</span><span><strong>${log.meals?log.meals.reduce((s,m)=>s+(m.carbs||0),0):0}</strong> / ${p.targets.carbs} غ</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,log.meals?log.meals.reduce((s,m)=>s+(m.carbs||0),0)*100/p.targets.carbs:0)}%"></div></div><div class="macro-row" style="margin-top:12px;"><span>🫒 الدهون</span><span><strong>${log.meals?log.meals.reduce((s,m)=>s+(m.fat||0),0):0}</strong> / ${p.targets.fat} غ</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,log.meals?log.meals.reduce((s,m)=>s+(m.fat||0),0)*100/p.targets.fat:0)}%"></div></div></div><div class="card"><div class="section-title">💡 نصائح اليوم الثلاث</div>${mealTips.map(tip=>`<div class="tip-box"><strong>${tip.time}</strong>\n${tip.tips}\n<br/><span style="font-size:13px;color:var(--primary);">السعرات المقترحة: ~${Math.round(p.targets.calories*tip.calPercent/100)}</span></div>`).join('')}</div><div class="card"><div class="section-title">🍽️ اقتراحات الآن</div>${suggestions.length===0?'<p class="muted">لقد وصلت لحد السعرات اليومي! 🎉</p>':suggestions.map(s=>`<div class="meal-suggestion"><div class="meal-suggestion-title">${s.title}</div><div class="meal-suggestion-desc">${s.desc}</div><div class="meal-suggestion-cal">~${s.cal} سعرة</div></div>`).join('')}</div><div class="card"><div class="section-title">🍽️ وجباتك اليوم</div>${!log.meals||log.meals.length===0?'<p class="muted">لم تسجل أي وجبات بعد - ابدأ الآن!</p>':log.meals.map(m=>`<div style="padding:12px;background:var(--primary-tint);border-radius:8px;margin-bottom:8px;border-right:4px solid var(--primary);"><p style="font-weight:700;margin:0 0 4px;">${esc(m.name||'وجبة')}</p><p style="font-size:14px;color:var(--muted);margin:0;">${m.cal} سعرة</p></div>`).join('')}</div></div><div class="bottom-nav"><button class="nav-item active" onclick="switchTab('home')">🏠<br/>الرئيسية</button><button class="nav-item" onclick="switchTab('meals')">🍽️<br/>وجباتي</button><button class="nav-item" onclick="switchTab('weight')">⚖️<br/>وزني</button><button class="nav-item" onclick="switchTab('settings')">⚙️<br/>إعدادات</button></div>`}function renderMeals(app){app.innerHTML=`<div class="app-header"><div class="app-title">إضافة وجبة<small>سجل ما تأكله</small></div></div><div class="container"><div class="card"><div class="section-title">🍽️ اختر الطعام</div><div class="field"><label>ما تريد تسجيله؟</label><select id="meal-food"><option value="">اختر طعاماً...</option>${FOODS_DB.map(f=>'<option value="'+f.id+'">'+f.icon+' '+f.name+'</option>').join('')}</select></div><div class="field"><label>كم الكمية؟</label><input type="number" id="meal-qty" min="0.5" step="0.25" value="1" placeholder="1"></div><button class="btn btn-primary" onclick="addQuickMeal()">✅ أضف الوجبة</button></div></div><div class="bottom-nav"><button class="nav-item" onclick="switchTab('home')">🏠<br/>الرئيسية</button><button class="nav-item active" onclick="switchTab('meals')">🍽️<br/>وجباتي</button><button class="nav-item" onclick="switchTab('weight')">⚖️<br/>وزني</button><button class="nav-item" onclick="switchTab('settings')">⚙️<br/>إعدادات</button></div>`}function renderWeight(app){app.innerHTML=`<div class="app-header"><div class="app-title">تتبع الوزن<small>راقب تقدمك</small></div></div><div class="container"><div class="card"><div class="section-title">⚖️ سجل وزنك اليوم</div><div class="field"><label>كم وزنك الآن؟</label><input type="number" id="weight-input" min="30" max="300" step="0.5" placeholder="أدخل الوزن"></div><button class="btn btn-primary" onclick="logWeight()">✅ سجل الوزن</button></div><div class="card"><div class="section-title">📈 سجل الأوزان السابقة</div>${STATE.tracking.weightHistory.length===0?'<p class="muted">ابدأ بتسجيل وزنك لمتابعة التقدم</p>':STATE.tracking.weightHistory.slice().reverse().slice(0,10).map(h=>`<div style="padding:12px;background:var(--primary-tint);border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:700;">${h.date}</span><span style="font-size:18px;font-weight:700;color:var(--primary);">${h.weight}</span></div>`).join('')}</div></div><div class="bottom-nav"><button class="nav-item" onclick="switchTab('home')">🏠<br/>الرئيسية</button><button class="nav-item" onclick="switchTab('meals')">🍽️<br/>وجباتي</button><button class="nav-item active" onclick="switchTab('weight')">⚖️<br/>وزني</button><button class="nav-item" onclick="switchTab('settings')">⚙️<br/>إعدادات</button></div>`}function renderSettings(app){app.innerHTML=`<div class="app-header"><div class="app-title">الإعدادات<small>تحكم بالتطبيق</small></div></div><div class="container"><div class="card"><div class="section-title">👤 ملفك الشخصي</div><p><strong>الاسم:</strong> ${esc(STATE.profile.name)}</p><p><strong>سعراتك اليومية:</strong> ${STATE.profile.targets.calories} سعرة</p><p><strong>بروتينك:</strong> ${STATE.profile.targets.protein} غ</p><p style="margin-top:14px;"><button class="btn btn-secondary" onclick="editProfile()" style="width:100%;margin:0;">✏️ عدّل بياناتك</button></p></div><div class="card"><div class="section-title">🔑 مفتاح API</div><p class="muted" style="margin-bottom:12px;">لتفعيل تحليل الصور والمساعد الذكي</p><div class="field"><input type="password" id="api-key" placeholder="sk-ant-..." value="${esc(STATE.ui.apiKey||'')}"></div><button class="btn btn-primary" onclick="saveApiKey()">💾 احفظ المفتاح</button></div><div class="card"><button class="btn btn-ghost" style="color:var(--warn);border-color:var(--warn);width:100%;" onclick="resetApp()">🔄 إعادة تعيين التطبيق</button></div></div><div class="bottom-nav"><button class="nav-item" onclick="switchTab('home')">🏠<br/>الرئيسية</button><button class="nav-item" onclick="switchTab('meals')">🍽️<br/>وجباتي</button><button class="nav-item" onclick="switchTab('weight')">⚖️<br/>وزني</button><button class="nav-item active" onclick="switchTab('settings')">⚙️<br/>إعدادات</button></div>`}function submitSetup(){const name=document.getElementById('ob-name').value;const age=parseInt(document.getElementById('ob-age').value);const gender=document.getElementById('ob-gender').value;const height=parseInt(document.getElementById('ob-height').value);const weight=parseFloat(document.getElementById('ob-weight').value);const goal=document.getElementById('ob-goal').value;if(!name||!age||!gender||!height||!weight||!goal){alert('✋ الرجاء ملء جميع الحقول');return}const bmr=gender==='male'?88.362+(13.397*weight)+(4.799*height)-(5.677*age):447.593+(9.247*weight)+(3.098*height)-(4.330*age);const tdee=Math.round(bmr*1.55);STATE.profile={name,age,gender,height,weight,goal,targets:{calories:tdee,protein:Math.round(weight*1.6),carbs:Math.round(tdee*0.45/4),fat:Math.round(tdee*0.3/9)}};save();renderApp()}function switchTab(tab){STATE.ui.tab=tab;renderApp()}function addQuickMeal(){const foodId=document.getElementById('meal-food').value;const qty=parseFloat(document.getElementById('meal-qty').value)||1;if(!foodId){alert('✋ اختر طعاماً أولاً');return}const food=FOODS_DB.find(f=>f.id===foodId);if(!food)return;const k=todayKey();if(!STATE.tracking.dailyLogs[k])STATE.tracking.dailyLogs[k]={meals:[]};const m={id:rand(),name:food.name,cal:Math.round(food.per100.cal*qty*food.gramsPerUnit/100),protein:Math.round(food.per100.protein*qty*food.gramsPerUnit/100),carbs:Math.round(food.per100.carbs*qty*food.gramsPerUnit/100),fat:Math.round(food.per100.fat*qty*food.gramsPerUnit/100)};STATE.tracking.dailyLogs[k].meals.push(m);save();switchTab('home')}function logWeight(){const w=parseFloat(document.getElementById('weight-input').value);if(!w||w<30||w>300){alert('✋ أدخل وزناً صحيحاً');return}const k=todayKey();const idx=STATE.tracking.weightHistory.findIndex(h=>h.date===k);if(idx>=0){STATE.tracking.weightHistory[idx].weight=w}else{STATE.tracking.weightHistory.push({date:k,weight:w})}save();switchTab('home')}function saveApiKey(){const key=document.getElementById('api-key').value;if(!key.startsWith('sk-ant-')&&key!==''){alert('⚠️ المفتاح يجب أن يبدأ بـ sk-ant-');return}STATE.ui.apiKey=key;save();alert('✅ تم حفظ المفتاح')}function editProfile(){if(confirm('⚠️ هل تريد تعديل بياناتك الشخصية؟')){STATE.profile=null;STATE.tracking={dailyLogs:{},weightHistory:[]};save();renderApp()}}function resetApp(){if(confirm('⚠️ هل أنت متأكد من إعادة تعيين التطبيق كاملاً؟\nهذا سيحذف جميع بيانات الوجبات والأوزان!')){STATE={profile:null,tracking:{dailyLogs:{},weightHistory:[]},ui:{tab:'home',apiKey:''}};localStorage.clear();renderApp()}}load();renderApp();
</script>
</body>
</html>
