<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="theme-color" content="#1F5C52">
<title>ميزان | مستشارك الصحي الذكي</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20180%20180%22%3E%3Crect%20fill%3D%22%231F5C52%22%20width%3D%22180%22%20height%3D%22180%22/%3E%3Ccircle%20cx%3D%2290%22%20cy%3D%2240%22%20r%3D%2210%22%20fill%3D%22%23FAF6EF%22/%3E%3Cline%20x1%3D%2290%22%20y1%3D%2252%22%20x2%3D%2290%22%20y2%3D%22100%22%20stroke%3D%22%23FAF6EF%22%20stroke-width%3D%225%22%20stroke-linecap%3D%22round%22/%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%22110%22%20r%3D%2224%22%20fill%3D%22%23C08A4E%22%20opacity%3D%220.8%22/%3E%3Ccircle%20cx%3D%22130%22%20cy%3D%22110%22%20r%3D%2224%22%20fill%3D%22%23C08A4E%22%20opacity%3D%221%22/%3E%3Cline%20x1%3D%2274%22%20y1%3D%22110%22%20x2%3D%22106%22%20y2%3D%22110%22%20stroke%3D%22%23FAF6EF%22%20stroke-width%3D%225%22%20stroke-linecap%3D%22round%22/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20180%20180%22%3E%3Crect%20fill%3D%22%231F5C52%22%20width%3D%22180%22%20height%3D%22180%22%20rx%3D%2240%22/%3E%3Ccircle%20cx%3D%2290%22%20cy%3D%2240%22%20r%3D%2210%22%20fill%3D%22%23FAF6EF%22/%3E%3Cline%20x1%3D%2290%22%20y1%3D%2252%22%20x2%3D%2290%22%20y2%3D%22100%22%20stroke%3D%22%23FAF6EF%22%20stroke-width%3D%225%22%20stroke-linecap%3D%22round%22/%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%22110%22%20r%3D%2224%22%20fill%3D%22%23C08A4E%22%20opacity%3D%220.8%22/%3E%3Ccircle%20cx%3D%22130%22%20cy%3D%22110%22%20r%3D%2224%22%20fill%3D%22%23C08A4E%22%20opacity%3D%221%22/%3E%3Cline%20x1%3D%2274%22%20y1%3D%22110%22%20x2%3D%22106%22%20y2%3D%22110%22%20stroke%3D%22%23FAF6EF%22%20stroke-width%3D%225%22%20stroke-linecap%3D%22round%22/%3E%3C/svg%3E">
<style>
:root{
  --ink:#22302C; --paper:#FAF6EF; --surface:#FFFFFF; --primary:#1F5C52; --primary-dark:#163F38; --primary-tint:#DCEAE6;
  --accent:#C08A4E; --accent-tint:#F1E3CC; --warn:#B5533A; --good:#3E7C5A; --line:#E6DFD2; --muted:#8A8175;
  --ink-soft:#6B6B6B;
  --font-display:'El Messiri', 'Segoe UI', sans-serif;
  --font-body:'Tajawal', 'Segoe UI', sans-serif;
  --radius-s:8px; --radius-m:12px; --radius-l:16px;
}
*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; height:100%; width:100%; overflow:hidden; }
body{ background:var(--paper); color:var(--ink); font-family:var(--font-body); -webkit-font-smoothing:antialiased; display:flex; width:100vw; height:100vh; }
#app{ width:100%; height:100%; display:flex; flex-direction:column; background:var(--paper); position:fixed; top:0; left:0; margin:0; }
.app-header{ position:fixed; top:0; left:0; right:0; z-index:10; background:var(--paper); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); width:100%; height:50px; flex-shrink:0; box-sizing:border-box; }
.app-title{ font-family:var(--font-display); font-size:20px; color:var(--primary-dark); font-weight:700; }
.container{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:55px 12px 65px; box-sizing:border-box; position:relative; }
.bottom-nav{ position:fixed; bottom:0; left:0; right:0; z-index:10; background:var(--surface); border-top:1px solid var(--line); display:flex; padding:6px 6px; width:100%; height:60px; flex-shrink:0; box-sizing:border-box; align-items:center; }
.nav-item{ flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none; padding:8px 4px; color:var(--muted); font-size:12px; font-weight:700; cursor:pointer; }
.nav-item.active{ color:var(--primary); }
.card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-m); padding:20px; margin-bottom:14px; }
.section-title{ font-size:17px; font-weight:700; color:var(--ink); margin:0 0 12px; }
.btn{ border:none; border-radius:var(--radius-s); padding:15px 20px; font-size:16px; font-weight:700; cursor:pointer; }
.btn-primary{ background:var(--primary); color:white; }
.btn-primary:active{ opacity:0.8; }
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:15px; font-weight:700; color:var(--ink-soft); margin-bottom:8px; }
.field input, .field textarea, .field select{ width:100%; padding:14px 16px; border:1.5px solid var(--line); border-radius:var(--radius-s); font-size:16px; color:var(--ink); background:var(--surface); font-family:var(--font-body); }
.field input:focus, .field textarea:focus, .field select:focus{ outline:2px solid var(--primary); outline-offset:1px; border-color:var(--primary); }
.btn-row{ display:flex; gap:10px; }
.btn-row .btn{ flex:1; }
.muted{ color:var(--muted); font-size:15px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// DATA
const GOALS = [
  {id:'lose', label:'فقدان الوزن', icon:'📉'},
  {id:'gain', label:'كسب الوزن', icon:'📈'},
  {id:'maintain', label:'الحفاظ على الوزن', icon:'⚖️'},
  {id:'muscle', label:'بناء العضلات', icon:'💪'},
  {id:'fatloss', label:'خسارة الدهون', icon:'🔥'},
  {id:'fitness', label:'تحسين اللياقة', icon:'🏃'},
  {id:'nutrition', label:'تحسين التغذية', icon:'🥗'}
];

const ACTIVITY_FACTORS = {sedentary:1.2, light:1.375, moderate:1.55, active:1.725, veryactive:1.9};

// STATE
let STATE = {
  profile: null,
  tracking: {dailyLogs:{}, weightHistory:[]},
  ui: {tab:'onboarding', step:1}
};

// STORAGE
function save() {
  try{
    if(STATE.profile) localStorage.setItem('mizanProfile', JSON.stringify(STATE.profile));
    if(STATE.tracking) localStorage.setItem('mizanTracking', JSON.stringify(STATE.tracking));
  }catch(e){}
}

function load() {
  try{
    const p = localStorage.getItem('mizanProfile');
    const t = localStorage.getItem('mizanTracking');
    if(p) STATE.profile = JSON.parse(p);
    if(t) STATE.tracking = JSON.parse(t);
    if(STATE.profile) STATE.ui.tab = 'home';
  }catch(e){}
}

// UTILS
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function esc(s) { return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// RENDER
function render() {
  const app = document.getElementById('app');
  if(!app) return;
  
  if(!STATE.profile) {
    renderOnboarding(app);
  } else {
    renderMain(app);
  }
}

function renderOnboarding(app) {
  app.innerHTML = `
    <div class="app-header">
      <div class="app-title">ميزان</div>
    </div>
    <div class="container">
      <div class="card">
        <div class="section-title">أهلاً بك في ميزان</div>
        <p class="muted">لنبدأ برحلتك نحو صحة أفضل</p>
        <div class="field">
          <label>الاسم</label>
          <input type="text" id="name" placeholder="اسمك">
        </div>
        <div class="field">
          <label>العمر</label>
          <input type="number" id="age" min="15" max="100">
        </div>
        <div class="field">
          <label>الجنس</label>
          <select id="gender">
            <option value="">اختري...</option>
            <option value="female">أنثى</option>
            <option value="male">ذكر</option>
          </select>
        </div>
        <div class="field">
          <label>الطول (سم)</label>
          <input type="number" id="height" min="100" max="250">
        </div>
        <div class="field">
          <label>الوزن الحالي (كغ)</label>
          <input type="number" id="weight" min="30" max="300" step="0.5">
        </div>
        <div class="field">
          <label>الهدف</label>
          <select id="goal">
            <option value="">اختري...</option>
            ${GOALS.map(g=>`<option value="${g.id}">${g.label}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-primary" onclick="startApp()">ابدئي الآن</button>
      </div>
    </div>
  `;
}

function renderMain(app) {
  const p = STATE.profile;
  app.innerHTML = `
    <div class="app-header">
      <div class="app-title">أهلاً ${esc(p.name)}</div>
    </div>
    <div class="container">
      <div class="card">
        <div class="section-title">السعرات اليومية</div>
        <div style="font-size:48px; text-align:center; color:var(--primary); font-weight:700;">
          ${p.targets.calories}
        </div>
        <div style="text-align:center; color:var(--muted); margin-top:8px;">
          السعرات المتاحة اليوم
        </div>
      </div>
      <div class="card">
        <div class="section-title">معلومات الملف</div>
        <p><strong>الاسم:</strong> ${esc(p.name)}</p>
        <p><strong>العمر:</strong> ${p.age} سنة</p>
        <p><strong>الطول:</strong> ${p.height} سم</p>
        <p><strong>الوزن:</strong> ${p.weight} كغ</p>
        <p><strong>الهدف:</strong> ${GOALS.find(g=>g.id===p.goal)?.label || 'غير محدد'}</p>
        <button class="btn btn-primary" onclick="resetApp()">إعادة تعيين</button>
      </div>
    </div>
    <div class="bottom-nav">
      <button class="nav-item active" onclick="switchTab('home')">🏠 الرئيسية</button>
      <button class="nav-item" onclick="switchTab('meals')">🍽️ الوجبات</button>
      <button class="nav-item" onclick="switchTab('weight')">⚖️ الوزن</button>
      <button class="nav-item" onclick="switchTab('settings')">⚙️ الإعدادات</button>
    </div>
  `;
}

// FUNCTIONS
function startApp() {
  const name = document.getElementById('name').value;
  const age = parseInt(document.getElementById('age').value);
  const gender = document.getElementById('gender').value;
  const height = parseInt(document.getElementById('height').value);
  const weight = parseFloat(document.getElementById('weight').value);
  const goal = document.getElementById('goal').value;
  
  if(!name || !age || !gender || !height || !weight || !goal) {
    alert('الرجاء ملء جميع الحقول');
    return;
  }
  
  // Calculate targets
  const bmr = gender === 'male'
    ? 88.362 + (13.397 * weight) + (4.799 * height) - (5.677 * age)
    : 447.593 + (9.247 * weight) + (3.098 * height) - (4.330 * age);
  
  const tdee = Math.round(bmr * 1.55);
  
  STATE.profile = {
    name, age, gender, height, weight, goal,
    targets: {calories: tdee, protein: Math.round(weight * 1.6), carbs: Math.round(tdee * 0.45 / 4), fat: Math.round(tdee * 0.3 / 9)}
  };
  
  save();
  render();
}

function switchTab(tab) {
  STATE.ui.tab = tab;
  render();
}

function resetApp() {
  if(confirm('هل أنتِ متأكدة؟')) {
    STATE = {profile:null, tracking:{dailyLogs:{}, weightHistory:[]}, ui:{tab:'onboarding', step:1}};
    localStorage.clear();
    render();
  }
}

// INIT
load();
render();
</script>
</body>
</html>
