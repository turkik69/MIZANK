<style>
:root{--ink:#22302C;--paper:#FAF6EF;--surface:#FFFFFF;--primary:#1F5C52;--primary-dark:#163F38;--primary-tint:#DCEAE6;--accent:#C08A4E;--accent-tint:#F1E3CC;--warn:#B5533A;--good:#3E7C5A;--line:#E6DFD2;--muted:#8A8175;--ink-soft:#6B6B6B;--font-display:'El Messiri',system-ui,sans-serif;--font-body:'Tajawal',system-ui,sans-serif;--radius-s:8px;--radius-m:12px;--radius-l:16px}*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;-webkit-user-select:none;user-select:none}body{background:var(--paper);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;display:flex;width:100vw;height:100vh}#app{width:100%;height:100%;display:flex;flex-direction:column;background:var(--paper);position:fixed;top:0;left:0;margin:0;box-sizing:border-box}.app-header{position:fixed;top:0;left:0;right:0;z-index:20;background:var(--paper);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--line);width:100%;height:56px;flex-shrink:0;box-sizing:border-box}.app-title{font-family:var(--font-display);font-size:24px;color:var(--primary-dark);font-weight:700}.app-title small{display:block;font-family:var(--font-body);font-size:11px;font-weight:400;color:var(--muted);margin-top:2px}.container{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:62px 12px 68px;box-sizing:border-box;position:relative}.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:20;background:var(--surface);border-top:2px solid var(--line);display:flex;padding:4px 4px;width:100%;height:64px;flex-shrink:0;box-sizing:border-box;align-items:center;justify-content:space-around}.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;padding:6px;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;transition:color 0.2s;border-radius:8px}.nav-item:active{background:var(--primary-tint);color:var(--primary)}.nav-item.active{color:var(--primary);background:var(--primary-tint)}.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-m);padding:18px;margin-bottom:14px}.section-title{font-size:18px;font-weight:700;color:var(--ink);margin:0 0 14px;display:flex;align-items:center;gap:8px}.section-title svg{width:24px;height:24px}.muted{color:var(--muted);font-size:15px;line-height:1.5}.btn{border:none;border-radius:var(--radius-s);padding:16px 18px;font-size:17px;font-weight:700;cursor:pointer;transition:all 0.2s;user-select:none;-webkit-tap-highlight-color:transparent}.btn-primary{background:var(--primary);color:white}.btn-primary:active{opacity:0.85;transform:scale(0.98)}.btn-secondary{background:var(--primary-tint);color:var(--primary);border:2px solid var(--primary)}.btn-ghost{background:none;border:2px solid var(--line);color:var(--ink)}.field{margin-bottom:16px}.field label{display:block;font-size:16px;font-weight:700;color:var(--ink-soft);margin-bottom:8px}.field input,.field textarea,.field select{width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:var(--radius-s);font-size:17px;color:var(--ink);background:var(--surface);font-family:var(--font-body);-webkit-appearance:none;appearance:none}.field input:focus,.field textarea:focus,.field select:focus{outline:2px solid var(--primary);outline-offset:1px;border-color:var(--primary)}.balance-figure{font-family:var(--font-display);font-size:64px;color:var(--primary-dark);line-height:1;text-align:center;font-weight:700;margin:16px 0}.macro-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;font-size:16px;border-bottom:1px solid var(--line)}.macro-row:last-child{border-bottom:none}.progress-bar{width:100%;height:8px;background:var(--line);border-radius:4px;overflow:hidden;margin-top:6px}.progress-fill{height:100%;background:var(--good);transition:width 0.3s}.meal-suggestion{background:var(--accent-tint);border-right:4px solid var(--accent);padding:12px;border-radius:8px;margin-bottom:12px}.meal-suggestion-title{font-weight:700;color:var(--ink);margin:0 0 4px}.meal-suggestion-desc{font-size:14px;color:var(--ink-soft);margin:4px 0}.meal-suggestion-cal{font-size:14px;font-weight:700;color:var(--accent)}.tip-box{background:var(--primary-tint);border-right:4px solid var(--primary);padding:12px;border-radius:8px;margin-bottom:12px;font-size:15px;line-height:1.6}
</style>

<div id="app"></div>
<script>
const FOODS_DB=[{id:'egg',name:'بيض',unit:'حبة (~50غ)',gramsPerUnit:50,per100:{cal:155,protein:13,carbs:1.1,fat:11},icon:'🥚'},{id:'rice',name:'أرز أبيض مطبوخ',unit:'100غ',gramsPerUnit:100,per100:{cal:130,protein:2.7,carbs:28,fat:0.3},icon:'🍚'},{id:'chicken',name:'دجاج مسلوق',unit:'100غ',gramsPerUnit:100,per100:{cal:165,protein:31,carbs:0,fat:3.6},icon:'🍗'},{id:'fish',name:'سمك مشوي',unit:'100غ',gramsPerUnit:100,per100:{cal:82,protein:18,carbs:0,fat:0.8},icon:'🐟'},{id:'meat',name:'لحم بقري',unit:'100غ',gramsPerUnit:100,per100:{cal:250,protein:26,carbs:0,fat:15},icon:'🥩'},{id:'milk',name:'حليب كامل',unit:'كوب (240ml)',gramsPerUnit:240,per100:{cal:61,protein:3.2,carbs:4.8,fat:3.3},icon:'🥛'},{id:'yogurt',name:'زبادي',unit:'100غ',gramsPerUnit:100,per100:{cal:59,protein:10,carbs:3.5,fat:0.4},icon:'🥄'},{id:'oats',name:'شوفان',unit:'100غ',gramsPerUnit:100,per100:{cal:389,protein:16.9,carbs:66,fat:6.9},icon:'🌾'},{id:'bread',name:'خبز أبيض',unit:'شريحة (30غ)',gramsPerUnit:30,per100:{cal:265,protein:9,carbs:49,fat:3.3},icon:'🍞'},{id:'cheese',name:'جبن',unit:'30غ',gramsPerUnit:30,per100:{cal:402,protein:25,carbs:1.3,fat:33},icon:'🧀'},{id:'apple',name:'تفاح',unit:'حبة (182غ)',gramsPerUnit:182,per100:{cal:52,protein:0.3,carbs:14,fat:0.2},icon:'🍎'},{id:'banana',name:'موز',unit:'حبة (118غ)',gramsPerUnit:118,per100:{cal:89,protein:1.1,carbs:23,fat:0.3},icon:'🍌'},{id:'vegetables',name:'خضروات مشكلة',unit:'100غ',gramsPerUnit:100,per100:{cal:35,protein:2.2,carbs:8,fat:0.2},icon:'🥦'},{id:'dates',name:'تمر',unit:'حبة (24غ)',gramsPerUnit:24,per100:{cal:282,protein:2.5,carbs:75,fat:0.4},icon:'🌴'},{id:'nuts',name:'مكسرات',unit:'حفنة (30غ)',gramsPerUnit:30,per100:{cal:607,protein:14,carbs:27,fat:54},icon:'🥜'},{id:'lentils',name:'عدس مطبوخ',unit:'100غ',gramsPerUnit:100,per100:{cal:116,protein:9,carbs:20,fat:0.4},icon:'🫘'}];const GOALS=[{id:'lose',label:'فقدان الوزن',icon:'📉'},{id:'gain',label:'كسب الوزن',icon:'📈'},{id:'maintain',label:'الحفاظ على الوزن',icon:'⚖️'},{id:'muscle',label:'بناء العضلات',icon:'💪'},{id:'fatloss',label:'خسارة الدهون',icon:'🔥'},{id:'fitness',label:'تحسين اللياقة',icon:'🏃'},{id:'nutrition',label:'تحسين التغذية',icon:'🥗'}];const MEAL_TIPS={lose:[{mealType:'breakfast',time:'الإفطار (6-8 صباحاً)',tips:'ابدئي بوجبة خفيفة غنية بالبروتين (25-30% من السعرات):\n• بيضتان + شريحة خبز + خضروات\n• يوغورت + حبات تمر',calPercent:25},{mealType:'lunch',time:'الغداء (12-2 ظهراً)',tips:'وجبة رئيسية متوازنة (45-50% من السعرات):\n• دجاج/سمك مع أرز وخضروات\n• تركيز على البروتين والألياف',calPercent:48},{mealType:'dinner',time:'العشاء (7-9 مساءً)',tips:'وجبة خفيفة قبل النوم (20-25% من السعرات):\n• دجاج مسلوق مع خضروات\n• تجنبي الكربوهيدرات الثقيلة',calPercent:27}],gain:[{mealType:'breakfast',time:'الإفطار (6-8 صباحاً)',tips:'وجبة فخمة غنية (30% من السعرات):\n• بيضتان + جبن + خبز + حليب\n• إضافة المكسرات والتمر',calPercent:30},{mealType:'lunch',time:'الغداء (12-2 ظهراً)',tips:'وجبة كبيرة (40-45% من السعرات):\n• لحم بقري مع أرز وزيت\n• إضافة منتجات ألبان\n• أكثري من الكربوهيدرات',calPercent:42},{mealType:'dinner',time:'العشاء (7-9 مساءً)',tips:'وجبة دسمة (25-30% من السعرات):\n• دجاج مع أرز وزيت زيتون\n• حليب ومكسرات كسناك',calPercent:28}],muscle:[{mealType:'breakfast',time:'الإفطار (6-8 صباحاً)',tips:'بروتين عالي (25-30% من السعرات):\n• بيضتان + حليب + شوفان\n• هدفك: 30-40 غرام بروتين',calPercent:27},{mealType:'lunch',time:'الغداء (12-2 ظهراً)',tips:'وجبة قوية للعضلات (45-50% من السعرات):\n• دجاج/سمك مع أرز + خضروات\n• البروتين الأساسي في اليوم',calPercent:48},{mealType:'dinner',time:'العشاء (7-9 مساءً)',tips:'بروتين خفيف (20-25% من السعرات):\n• سمك مسلوق مع خضروات\n• قبل النوم بساعتين',calPercent:25}],maintain:[{mealType:'breakfast',time:'الإفطار (6-8 صباحاً)',tips:'وجبة متوازنة (25-30% من السعرات):\n• بيضة أو زبادي مع فاكهة\n• كمية معتدلة من كل عنصر',calPercent:28},{mealType:'lunch',time:'الغداء (12-2 ظهراً)',tips:'وجبة رئيسية (45-50% من السعرات):\n• بروتين + كربوهيدرات + دهون صحية\n• التوازن هو المفتاح',calPercent:48},{mealType:'dinner',time:'العشاء (7-9 مساءً)',tips:'وجبة خفيفة متوازنة (20-25% من السعرات):\n• بروتين + خضروات\n• تجنبي الإفراط',calPercent:24}]};const GOALS=[{id:'lose',label:'فقدان الوزن',icon:'📉'},{id:'gain',label:'كسب الوزن',icon:'📈'},{id:'maintain',label:'الحفاظ على الوزن',icon:'⚖️'},{id:'muscle',label:'بناء العضلات',icon:'💪'},{id:'fatloss',label:'خسارة الدهون',icon:'🔥'},{id:'fitness',label:'تحسين اللياقة',icon:'🏃'},{id:'nutrition',label:'تحسين التغذية',icon:'🥗'}];let STATE={profile:null,tracking:{dailyLogs:{},weightHistory:[]},ui:{tab:'home',apiKey:''}};function save(){try{if(STATE.profile)localStorage.setItem('mizanProfile',JSON.stringify(STATE.profile));if(STATE.tracking)localStorage.setItem('mizanTracking',JSON.stringify(STATE.tracking));if(STATE.ui.apiKey)localStorage.setItem('mizanApiKey',STATE.ui.apiKey)}catch(e){}}function load(){try{const p=localStorage.getItem('mizanProfile');const t=localStorage.getItem('mizanTracking');const k=localStorage.getItem('mizanApiKey');if(p)STATE.profile=JSON.parse(p);if(t)STATE.tracking=JSON.parse(t);if(k)STATE.ui.apiKey=k;if(STATE.profile)STATE.ui.tab='home'}catch(e){}}function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function rand(){return Math.floor(Math.random()*1000000)}function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function getMealTips(){const goal=STATE.profile.goal;return MEAL_TIPS[goal]||MEAL_TIPS.maintain}function getMealSuggestions(remaining){const suggestions=[];if(remaining>=500){suggestions.push({title:'🥐 إفطار سريع',desc:'بيضتان + شريحة خبز + حليب',cal:~450})}if(remaining>=600&&remaining<800){suggestions.push({title:'🥗 سلطة صحية',desc:'دجاج مسلوق + خضروات + زيت زيتون',cal:~550})}if(remaining>=800){suggestions.push({title:'🍖 وجبة كاملة',desc:'لحم/دجاج مع أرز وخضروات',cal:~750})}if(remaining<300){suggestions.push({title:'🍎 فاكهة خفيفة',desc:'تفاحة أو موزة',cal:~80})}if(remaining>=300&&remaining<500){suggestions.push({title:'🥛 زبادي مع تمر',desc:'زبادي + حفنة تمر',cal:~200})}return suggestions}function renderApp(){const app=document.getElementById('app');if(!STATE.profile){renderSetup(app)}else if(STATE.ui.tab==='home'){renderHome(app)}else if(STATE.ui.tab==='meals'){renderMeals(app)}else if(STATE.ui.tab==='weight'){renderWeight(app)}else if(STATE.ui.tab==='settings'){renderSettings(app)}}function renderSetup(app){app.innerHTML=`<div class="app-header"><div class="app-title">ميزان<small>مرحباً بك</small></div></div><div class="container"><div class="card"><div class="section-title">أهلاً وسهلاً في ميزان</div><p class="muted">لنبدئي برحلتك نحو صحة أفضل وأكثر توازناً 💪</p><div class="field"><label>اسمك</label><input type="text" id="ob-name" placeholder="أدخلي اسمك كاملاً"></div><div class="field"><label>عمرك</label><input type="number" id="ob-age" min="15" max="100" placeholder="مثال: 25"></div><div class="field"><label>جنسك</label><select id="ob-gender"><option value="">اختاري...</option><option value="female">أنثى</option><option value="male">ذكر</option></select></div><div class="field"><label>طولك (سم)</label><input type="number" id="ob-height" min="100" max="250" placeholder="مثال: 165"></div><div class="field"><label>وزنك الحالي (كغ)</label><input type="number" id="ob-weight" min="30" max="300" step="0.5" placeholder="مثال: 65"></div><div class="field"><label>هدفك الرئيسي</label><select id="ob-goal"><option value="">اختاري...</option>${GOALS.map(g=>'<option value="'+g.id+'">'+g.icon+' '+g.label+'</option>').join('')}</select></div><button class="btn btn-primary" onclick="submitSetup()">ابدئي الآن</button></div></div>`;document.getElementById('ob-name').focus()}function renderHome(app){const p=STATE.profile;const k=todayKey();const log=STATE.tracking.dailyLogs[k]||{};const consumed=log.meals?log.meals.reduce((s,m)=>s+(m.cal||0),0):0;const remaining=Math.max(0,p.targets.calories-consumed);const mealTips=getMealTips();const suggestions=getMealSuggestions(remaining);app.innerHTML=`<div class="app-header"><div class="app-title">أهلاً ${esc(p.name)}<small>${new Date().toLocaleDateString('ar')}</small></div></div><div class="container"><div class="card"><div class="section-title">⚖️ سعراتك المتبقية</div><div class="balance-figure">${remaining}</div><p style="text-align:center;color:var(--muted);font-size:16px;margin:0;">من أصل ${p.targets.calories} سعرة</p></div><div class="card"><div class="section-title">📊 التفاصيل الغذائية</div><div class="macro-row"><span>🥛 البروتين</span><span><strong>${log.meals?log.meals.reduce((s,m)=>s+(m.protein||0),0):0}</strong> / ${p.targets.protein} غ</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,log.meals?log.meals.reduce((s,m)=>s+(m.protein||0),0)*100/p.targets.protein:0)}%"></div></div><div class="macro-row" style="margin-top:12px;"><span>🌾 الكربوهيدرات</span><span><strong>${log.meals?log.meals.reduce((s,m)=>s+(m.carbs||0),0):0}</strong> / ${p.targets.carbs} غ</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,log.meals?log.meals.reduce((s,m)=>s+(m.carbs||0),0)*100/p.targets.carbs:0)}%"></div></div><div class="macro-row" style="margin-top:12px;"><span>🫒 الدهون</span><span><strong>${log.meals?log.meals.reduce((s,m)=>s+(m.fat||0),0):0}</strong> / ${p.targets.fat} غ</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,log.meals?log.meals.reduce((s,m)=>s+(m.fat||0),0)*100/p.targets.fat:0)}%"></div></div></div><div class="card"><div class="section-title">💡 نصائح اليوم الثلاث</div>${mealTips.map(tip=>`<div class="tip-box"><strong>${tip.time}</strong>\n${tip.tips}\n<br/><span style="font-size:13px;color:var(--primary);">السعرات المقترحة: ~${Math.round(p.targets.calories*tip.calPercent/100)}</span></div>`).join('')}</div><div class="card"><div class="section-title">🍽️ اقتراحات الآن</div>${suggestions.length===0?'<p class="muted">لقد وصلتِ لحد السعرات اليومي! 🎉</p>':suggestions.map(s=>`<div class="meal-suggestion"><div class="meal-suggestion-title">${s.title}</div><div class="meal-suggestion-desc">${s.desc}</div><div class="meal-suggestion-cal">~${s.cal} سعرة</div></div>`).join('')}</div><div class="card"><div class="section-title">🍽️ وجباتك اليوم</div>${!log.meals||log.meals.length===0?'<p class="muted">لم تسجلي أي وجبات بعد - ابدئي الآن!</p>':log.meals.map(m=>`<div style="padding:12px;background:var(--primary-tint);border-radius:8px;margin-bottom:8px;border-right:4px solid var(--primary);"><p style="font-weight:700;margin:0 0 4px;">${esc(m.name||'وجبة')}</p><p style="font-size:14px;color:var(--muted);margin:0;">${m.cal} سعرة</p></div>`).join('')}</div></div><div class="bottom-nav"><button class="nav-item active" onclick="switchTab('home')">🏠<br/>الرئيسية</button><button class="nav-item" onclick="switchTab('meals')">🍽️<br/>وجباتي</button><button class="nav-item" onclick="switchTab('weight')">⚖️<br/>وزني</button><button class="nav-item" onclick="switchTab('settings')">⚙️<br/>إعدادات</button></div>`}function renderMeals(app){app.innerHTML=`<div class="app-header"><div class="app-title">إضافة وجبة<small>سجلي ما تأكلين</small></div></div><div class="container"><div class="card"><div class="section-title">🍽️ اختاري الطعام</div><div class="field"><label>ما تريدين تسجيله؟</label><select id="meal-food"><option value="">اختاري طعاماً...</option>${FOODS_DB.map(f=>'<option value="'+f.id+'">'+f.icon+' '+f.name+'</option>').join('')}</select></div><div class="field"><label>كم الكمية؟</label><input type="number" id="meal-qty" min="0.5" step="0.25" value="1" placeholder="1"></div><button class="btn btn-primary" onclick="addQuickMeal()">✅ أضيفي الوجبة</button></div></div><div class="bottom-nav"><button class="nav-item" onclick="switchTab('home')">🏠<br/>الرئيسية</button><button class="nav-item active" onclick="switchTab('meals')">🍽️<br/>وجباتي</button><button class="nav-item" onclick="switchTab('weight')">⚖️<br/>وزني</button><button class="nav-item" onclick="switchTab('settings')">⚙️<br/>إعدادات</button></div>`}function renderWeight(app){app.innerHTML=`<div class="app-header"><div class="app-title">تتبع الوزن<small>راقبي تقدمك</small></div></div><div class="container"><div class="card"><div class="section-title">⚖️ سجلي وزنك اليوم</div><div class="field"><label>كم وزنك الآن؟</label><input type="number" id="weight-input" min="30" max="300" step="0.5" placeholder="أدخلي الوزن"></div><button class="btn btn-primary" onclick="logWeight()">✅ سجلي الوزن</button></div><div class="card"><div class="section-title">📈 سجل الأوزان السابقة</div>${STATE.tracking.weightHistory.length===0?'<p class="muted">ابدئي بتسجيل وزنك لمتابعة التقدم</p>':STATE.tracking.weightHistory.slice().reverse().slice(0,10).map(h=>`<div style="padding:12px;background:var(--primary-tint);border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:700;">${h.date}</span><span style="font-size:18px;font-weight:700;color:var(--primary);">${h.weight}</span></div>`).join('')}</div></div><div class="bottom-nav"><button class="nav-item" onclick="switchTab('home')">🏠<br/>الرئيسية</button><button class="nav-item" onclick="switchTab('meals')">🍽️<br/>وجباتي</button><button class="nav-item active" onclick="switchTab('weight')">⚖️<br/>وزني</button><button class="nav-item" onclick="switchTab('settings')">⚙️<br/>إعدادات</button></div>`}function renderSettings(app){app.innerHTML=`<div class="app-header"><div class="app-title">الإعدادات<small>تحكمي بالتطبيق</small></div></div><div class="container"><div class="card"><div class="section-title">👤 ملفك الشخصي</div><p><strong>الاسم:</strong> ${esc(STATE.profile.name)}</p><p><strong>سعراتك اليومية:</strong> ${STATE.profile.targets.calories} سعرة</p><p><strong>بروتينك:</strong> ${STATE.profile.targets.protein} غ</p><p style="margin-top:14px;"><button class="btn btn-secondary" onclick="editProfile()" style="width:100%;margin:0;">✏️ عدّلي بياناتك</button></p></div><div class="card"><div class="section-title">🔑 مفتاح API</div><p class="muted" style="margin-bottom:12px;">لتفعيل تحليل الصور والمساعد الذكي</p><div class="field"><input type="password" id="api-key" placeholder="sk-ant-..." value="${esc(STATE.ui.apiKey||'')}"></div><button class="btn btn-primary" onclick="saveApiKey()">💾 احفظي المفتاح</button></div><div class="card"><button class="btn btn-ghost" style="color:var(--warn);border-color:var(--warn);width:100%;" onclick="resetApp()">🔄 إعادة تعيين التطبيق</button></div></div><div class="bottom-nav"><button class="nav-item" onclick="switchTab('home')">🏠<br/>الرئيسية</button><button class="nav-item" onclick="switchTab('meals')">🍽️<br/>وجباتي</button><button class="nav-item" onclick="switchTab('weight')">⚖️<br/>وزني</button><button class="nav-item active" onclick="switchTab('settings')">⚙️<br/>إعدادات</button></div>`}function submitSetup(){const name=document.getElementById('ob-name').value;const age=parseInt(document.getElementById('ob-age').value);const gender=document.getElementById('ob-gender').value;const height=parseInt(document.getElementById('ob-height').value);const weight=parseFloat(document.getElementById('ob-weight').value);const goal=document.getElementById('ob-goal').value;if(!name||!age||!gender||!height||!weight||!goal){alert('✋ الرجاء ملء جميع الحقول');return}const bmr=gender==='male'?88.362+(13.397*weight)+(4.799*height)-(5.677*age):447.593+(9.247*weight)+(3.098*height)-(4.330*age);const tdee=Math.round(bmr*1.55);STATE.profile={name,age,gender,height,weight,goal,targets:{calories:tdee,protein:Math.round(weight*1.6),carbs:Math.round(tdee*0.45/4),fat:Math.round(tdee*0.3/9)}};save();renderApp()}function switchTab(tab){STATE.ui.tab=tab;renderApp()}function addQuickMeal(){const foodId=document.getElementById('meal-food').value;const qty=parseFloat(document.getElementById('meal-qty').value)||1;if(!foodId){alert('✋ اختاري طعاماً أولاً');return}const food=FOODS_DB.find(f=>f.id===foodId);if(!food)return;const k=todayKey();if(!STATE.tracking.dailyLogs[k])STATE.tracking.dailyLogs[k]={meals:[]};const m={id:rand(),name:food.name,cal:Math.round(food.per100.cal*qty*food.gramsPerUnit/100),protein:Math.round(food.per100.protein*qty*food.gramsPerUnit/100),carbs:Math.round(food.per100.carbs*qty*food.gramsPerUnit/100),fat:Math.round(food.per100.fat*qty*food.gramsPerUnit/100)};STATE.tracking.dailyLogs[k].meals.push(m);save();switchTab('home')}function logWeight(){const w=parseFloat(document.getElementById('weight-input').value);if(!w||w<30||w>300){alert('✋ أدخلي وزناً صحيحاً');return}const k=todayKey();const idx=STATE.tracking.weightHistory.findIndex(h=>h.date===k);if(idx>=0){STATE.tracking.weightHistory[idx].weight=w}else{STATE.tracking.weightHistory.push({date:k,weight:w})}save();switchTab('home')}function saveApiKey(){const key=document.getElementById('api-key').value;if(!key.startsWith('sk-ant-')&&key!==''){alert('⚠️ المفتاح يجب أن يبدأ بـ sk-ant-');return}STATE.ui.apiKey=key;save();alert('✅ تم حفظ المفتاح')}function editProfile(){if(confirm('⚠️ هل تريدين تعديل بياناتك الشخصية؟')){STATE.profile=null;STATE.tracking={dailyLogs:{},weightHistory:[]};save();renderApp()}}function resetApp(){if(confirm('⚠️ هل أنتِ متأكدة من إعادة تعيين التطبيق كاملاً؟\nهذا سيحذف جميع بيانات الوجبات والأوزان!')){STATE={profile:null,tracking:{dailyLogs:{},weightHistory:[]},ui:{tab:'home',apiKey:''}};localStorage.clear();renderApp()}}load();renderApp();
</script>
</body>
